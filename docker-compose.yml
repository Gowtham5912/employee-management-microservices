services:

  mysql:
    build:
      context: ./mysql
    environment:
      MYSQL_ROOT_PASSWORD: Sonu@123
      MYSQL_DATABASE: employee_db
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pSonu@123"]
      interval: 10s
      timeout: 5s
      retries: 10

  department-service:
    build:
      context: ./department-service
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8083:8083"

  employee-service:
    build:
      context: ./employee-service
    depends_on:
      mysql:
        condition: service_healthy
      department-service:
        condition: service_started
    ports:
      - "8080:8080"

volumes:
  mysql-data: